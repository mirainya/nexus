      description: 调整步骤执行顺序
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: integer
      - description: '步骤 ID 列表 {step_ids: [1,2,3]}'
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 重排 Pipeline 步骤
      tags:
      - Pipeline
  /admin/prompts:
    get:
      description: 获取所有提示词模板
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 获取提示词模板列表
      tags:
      - 提示词
    post:
      consumes:
      - application/json
      description: 创建新的提示词模板
      parameters:
      - description: 模板内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.PromptTemplate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 创建提示词模板
      tags:
      - 提示词
