      - Pipeline
    put:
      consumes:
      - application/json
      description: 更新 Pipeline 配置
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: integer
      - description: Pipeline 配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.Pipeline'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 更新 Pipeline
      tags:
      - Pipeline
  /admin/pipelines/{id}/steps:
