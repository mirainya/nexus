      description: 删除指定 Pipeline
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 删除 Pipeline
      tags:
      - Pipeline
    get:
      description: 获取指定 Pipeline 及其步骤
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: integer
      produces:
