          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 创建 LLM Provider
      tags:
      - LLM Provider
  /admin/llm-providers/{id}:
    delete:
      description: 删除指定 LLM 提供商
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 删除 LLM Provider
      tags:
      - LLM Provider
    put:
      consumes:
      - application/json
      description: 更新 LLM 提供商配置
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.LLMProviderUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 更新 LLM Provider
      tags:
      - LLM Provider
  /admin/llm-providers/{id}/default:
    put:
      description: 将指定 Provider 设为默认
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 设置默认 Provider
      tags:
      - LLM Provider
  /admin/llm-providers/{name}/models:
    get:
      description: 获取指定 Provider 支持的模型
      parameters:
      - description: Provider 名称
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 获取 Provider 模型列表
      tags:
      - LLM Provider
  /admin/pipelines:
    get:
      description: 获取所有 Pipeline
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/resp.Response'
      security:
      - BearerAuth: []
      summary: 获取 Pipeline 列表
